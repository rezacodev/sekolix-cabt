# ==============================================================
# nixpacks.toml — Konfigurasi Build untuk Railway
# ==============================================================
#
# Railway menggunakan Nixpacks untuk membangun aplikasi secara
# otomatis. File ini hanya MENAMBAH/OVERRIDE hal yang tidak bisa
# dideteksi otomatis.
#
# Nixpacks SUDAH otomatis mendeteksi:
#   - PHP (via composer.json) + semua ext-* yang dideklarasikan di require
#   - Node.js (via package.json)
#   - Composer (bundled dengan PHP provider)
#
# File ini hanya perlu menentukan:
#   - Versi Node.js spesifik (auto-detect bisa pakai versi lama)
#   - Perintah install yang tepat (--no-dev untuk production)
#   - Perintah start
#
# Dokumentasi: https://nixpacks.com/docs/configuration/file
# ==============================================================

[phases.setup]
# Hanya tambahkan paket yang TIDAK dideteksi otomatis.
# PHP + semua extension diambil dari composer.json "require" (ext-*).
# Node.js versi spesifik perlu dideklarasikan di sini.
nixPkgs = [
    "nodejs_20",    # Node.js 20 LTS — untuk build Vite/Tailwind
]

[phases.install]
# Override perintah install agar menggunakan flag production yang tepat.
# --no-dev        : jangan install package development (hemat build size)
# --prefer-dist   : unduh zip archive, lebih cepat dari git clone
# npm ci          : install dari package-lock.json (tidak ubah versi)
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
    "npm ci",
    "npm run build",
]

[start]
# Dijalankan setiap container mulai. Lihat start.sh untuk detail.
cmd = "bash start.sh"

# Perintah yang dijalankan SETIAP KALI container dimulai atau restart.
# Migrasi DB, cache config, dan web server dijalankan dari start.sh.
# Lihat start.sh untuk detail setiap langkah.
cmd = "bash start.sh"
